# offline_build_index.yaml
# Offline: docs(pdf...) -> corpus -> chunk -> embed -> index

# MCP Server
servers:
  corpus: servers/corpus
  benchmark: servers/benchmark
  retriever: servers/retriever
  prompt: servers/prompt
  generation: servers/generation
  evaluation: servers/evaluation
  custom: servers/custom

# MCP Client Pipeline
pipeline:
  # 1) 文档解析/抽取：raw docs -> text corpus (json/jsonl)
  - corpus.build_text_corpus

  # 2) 语料切分：corpus -> chunks (jsonl), must keep each chunk < embedding max length
  - corpus.chunk_documents

  # 3) 初始化 retriever（加载 embedding backend、index backend 等）
  - retriever.retriever_init

  # 4) 对 chunks 做 embedding（生成 embedding_path，例如 .npy）
  - retriever.retriever_embed

  # 5) 建索引（FAISS/Milvus），输出 index_path
  - retriever.retriever_index
