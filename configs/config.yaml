# IRIS Configuration File
# Intelligent Research Information System [IRIS]

# ============================================================
# IRIS Configuration
# ============================================================

update:
  interval_hours: 1  # How often to search for new papers

arxiv:
  keywords:
    - neutrino
    - juno
    - dune
    - hyper-kamiokande
    - super-kamiokande
    - sno
    - kamland
    - borexino
  max_results_per_keyword: 1
  sort_by: SubmittedDate  # Options: SubmittedDate, LastUpdatedDate, Relevance

storage:
  database_root: /home/NagaiYoru/research/IRIS_papers
  paper_db_path: /home/NagaiYoru/research/IRIS_papers/iris_papers.db
  # Each update creates a timestamped folder structure:
  # update_YYYY_MM_DD_HHMM/
  #   ├── pdfs/
  #   ├── logs/
  #   │   ├── summary_log.md
  #   │   ├── knowledge_log.md
  #   ├── metadata.json
  #   └── update_log.md

# Model paths
models:
  embedding_model_path: /home/NagaiYoru/LLM_model/Qwen3-Embedding-0.6B
  reranker_model_path: /home/NagaiYoru/LLM_model/bge-reranker-v2-m3
  llm_model_path: /home/NagaiYoru/LLM_model/Llama-3.2-3B-Instruct

# Milvus configuration
milvus:
  uri: http://localhost:29901
  collection_name: iris_papers
  master_collection: iris_papers_master
  embedding_dim: 1024  # dimension same with embedding model
  enabled: true
  container_name: iris-milvus
  data_dir: /home/NagaiYoru/research/IRIS_papers/iris-milvus
  grpc_port: 29901
  http_port: 29902
  image: milvusdb/milvus:latest
  token: null

# Embedding service configuration
embedding:
  base_url: http://127.0.0.1:65503/v1
  model_name: qwen3-embedding-0.6b
  batch_size: 32
  enabled: true

# Reranker service configuration
reranker:
  model_path: /home/NagaiYoru/LLM_model/bge-reranker-v2-m3
  batch_size: 16
  device: cpu  # Or "cuda:0" for GPU
  enabled: false  # Set to true to enable reranking

# Document processing configuration
document:
  chunk_size: 512
  chunk_overlap: 50
  use_title: true
  chunk_backend: sentence  # Options: token, sentence, recursive

# Retrieval configuration
retrieval:
  top_k: 5
  rerank_multiplier: 3  # Retrieve top_k * this many, then rerank to top_k

# QA generation configuration
qa:
  model_name: llama3-3b-instruct  # Model name for vLLM API calls
  question_set_path: ./configs/questions.txt
  system_prompt: "你是一个专业的文献库搜索总结智能助手。请基于提供的英文文献，忽略参考文献，使用中文回答问题，要求足够专业。"
  temperature: 0.7
  top_p: 0.8
  max_tokens: 2048
  # vLLM QA model configuration
  base_url: http://127.0.0.1:65504/v1
  max_model_len: 8192
  gpu_memory_utilization: 0.85
  tensor_parallel_size: 1
  enforce_eager: true

email:
  enabled: false  # Set to true to enable email notifications
  sender: your_email@gmail.com
  smtp_server: smtp.gmail.com
  smtp_port: 587
  password: your_app_password  # Use app-specific password for Gmail
  receiver: your_email@gmail.com
  subject_prefix: "[IRIS] "

filtering:
  exclude_reviews: true
  review_keywords:
    - review
    - survey
    - overview

duplicate_detection:
  enabled: true

logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR
  log_dir: ./logs
