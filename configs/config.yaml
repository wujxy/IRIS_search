# IRIS Configuration File
# Intelligent Research Information System [IRIS]

# ============================================================
# IRIS Configuration 
# for iris_query.py， run_update_cycle.py, run_web.py
# ============================================================

update:
  interval_hours: 1  # How often to search for new papers

arxiv:
  keywords:
    - neutrino
    - juno
    - dune
    - hyper-kamiokande
    - super-kamiokande
    - sno
    - kamland
    - borexino
  max_results_per_keyword: 3
  sort_by: SubmittedDate  # Options: SubmittedDate, LastUpdatedDate, Relevance

storage:
  database_root: /home/NagaiYoru/research/IRIS_papers
  paper_db_path: /home/NagaiYoru/research/IRIS_papers/iris_papers.db
  # Each update creates a timestamped folder structure:
  # update_YYYY_MM_DD_HHMM/
  #   ├── pdfs/
  #   ├── logs/
  #   │   ├── summary_log.md
  #   │   ├── knowledge_log.md
  #   ├── metadata.json
  #   └── update_log.md

# Model paths
models:
  embedding_model_path: /home/NagaiYoru/LLM_model/Qwen3-Embedding-0.6B
  reranker_model_path: /home/NagaiYoru/LLM_model/bge-reranker-v2-m3
  llm_model_path: /home/NagaiYoru/LLM_model/Llama-3.2-3B-Instruct

# Milvus configuration
milvus:
  uri: http://localhost:29901
  collection_name: iris_papers
  master_collection: iris_papers_master
  embedding_dim: 1024  # dimension same with embedding model
  enabled: true
  container_name: iris-milvus
  data_dir: /home/NagaiYoru/research/IRIS_papers/iris-milvus
  grpc_port: 29901
  http_port: 29902
  image: milvusdb/milvus:latest
  token: null

# Embedding service configuration
embedding:
  provider: local # Provider: local, openai, cohere, azure_openai
  # Local VLLM config
  base_url: http://127.0.0.1:65503/v1
  model_name: qwen3-embedding-0.6b
  batch_size: 32
  enabled: true
  max_model_len: 4096
  gpu_memory_utilization: 0.15
  tensor_parallel_size: 1
  enforce_eager: true
  # External API support (optional)
  api_key: ${OPENAI_API_KEY} # Use environment variable for security
  openai:
    model: text-embedding-3-small  # OpenAI model name
    dimensions: 1536
  cohere:
    model: embed-english-v3.0
    input_type: search_document
  azure_openai:
    endpoint: https://your-resource.openai.azure.com
    api_version: 2024-02-01
    deployment: your-deployment-name

# Reranker service configuration
reranker:
  provider: local # Provider: local, cohere, openai_compatible
  enabled: false  # Set to true to enable reranking
  # Local rerank model 
  model_path: /home/NagaiYoru/LLM_model/MiniCPM-Reranker-Light
  batch_size: 16
  device: cpu  # cpu Or cuda:0
  # External API support (optional)
  api_key: ${COHERE_API_KEY}  # Use environment variable for security
  api_url: null  # For OpenAI-compatible endpoints
  cohere:
    model: rerank-english-v3.0
    top_n: 5
  openai_compatible:
    model: bge-reranker-v2-m3
    endpoint: http://your-reranker-api/v1

# Document processing configuration
document:
  chunk_size: 512
  chunk_overlap: 50
  use_title: true
  chunk_backend: sentence  # Options: token, sentence, recursive

# Retrieval configuration
retrieval:
  top_k: 5
  rerank_multiplier: 3  # Retrieve top_k * this many, then rerank to top_k

# QA generation configuration
qa:
  provider: local # Provider: local, openai, anthropic, cohere, azure_openai
  model_name: llama3-3b-instruct  # Model name for vLLM API calls
  question_set_path: ./configs/questions.txt
  system_prompt: "你是一个专业的文献库搜索总结智能助手。请基于提供的英文文献，忽略参考文献，使用中文回答问题，要求足够专业。"
  temperature: 0.7
  top_p: 0.8
  max_tokens: 2048
  # vLLM QA model configuration
  base_url: http://127.0.0.1:65504/v1
  max_model_len: 4096
  gpu_memory_utilization: 0.84
  tensor_parallel_size: 1
  enforce_eager: true
  # External API support (optional)
  # api_key: ${OPENAI_API_KEY}  # Use environment variable for security
  openai:
    model: gpt-4o-mini
  anthropic:
    model: claude-3-5-sonnet-20241022
    max_tokens: 4096
    version: "2023-05-22"
  cohere:
    model: command-r-plus
    connect_timeout: 30
  azure_openai:
    endpoint: https://your-resource.openai.azure.com
    api_version: 2024-02-01
    deployment: your-deployment-name

email:
  enabled: false  # Set to true to enable email notifications
  sender: your_email@gmail.com
  smtp_server: smtp.gmail.com
  smtp_port: 587
  password: your_app_password  # Use app-specific password for Gmail
  receiver: your_email@gmail.com
  subject_prefix: "[IRIS] "

filtering:
  exclude_reviews: true
  review_keywords:
    - review
    - survey
    - overview

duplicate_detection:
  enabled: true

logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR
  log_dir: ./logs

# Web interface configuration
web:
  host: "127.0.0.1"
  port: 8000
  reload: true
  log_level: "info"
  pagination:
    default_per_page: 10
    max_per_page: 100
