# IRIS Configuration File
# Intelligent Research Information System [IRIS]

# ============================================================
# IRIS Configuration 
# for iris_query.py， run_update_cycle.py, run_web.py
# ============================================================

scheduler:
  enabled: true  # Enable scheduler mode
  default_interval_hours: 24  # Default interval for scheduled tasks
  history_retention_days: 30  # How long to keep task records
  log_level: INFO  # Scheduler logging level

arxiv:
  keywords:
    - neutrino
    - juno
    - dune
    - hyper-kamiokande
    - super-kamiokande
    - sno
    - kamland
    - borexino
  max_results_per_keyword: 10
  sort_by: SubmittedDate  # Options: SubmittedDate, LastUpdatedDate, Relevance

# Document processing configuration
document:
  chunk_size: 512
  chunk_overlap: 50
  use_title: true
  chunk_backend: sentence  # Options: sentence, recursive, semantic
  remove_references: true  # Remove references/bibliography section from PDFs
  reference_keywords:      # Keywords that indicate reference section
    - References
    - Bibliography
    - REFERENCES
    - BIBLIOGRAPHY
    - 参考文献

storage:
  database_root: /home/NagaiYoru/research/IRIS_papers
  paper_db_path: /home/NagaiYoru/research/IRIS_papers/iris_papers.db
  # Each update creates a timestamped folder structure:
  # update_YYYY_MM_DD_HHMM/
  #   ├── pdfs/
  #   ├── logs/
  #   │   ├── summary_log.md
  #   │   ├── knowledge_log.md
  #   ├── metadata.json
  #   └── update_log.md

# Model paths
models:
  embedding_model_path: /home/NagaiYoru/LLM_model/Qwen3-Embedding-0.6B
  reranker_model_path: /home/NagaiYoru/LLM_model/MiniCPM-Reranker-Light
  llm_model_path: /home/NagaiYoru/LLM_model/Llama-3.2-3B-Instruct

# Milvus configuration
milvus:
  uri: http://localhost:29901
  collection_name: iris_papers
  master_collection: iris_papers_master
  embedding_dim: 1024  # dimension same with embedding model
  enabled: true
  container_name: iris-milvus
  data_dir: /home/NagaiYoru/research/IRIS_papers/iris-milvus
  grpc_port: 29901
  http_port: 29902
  image: milvusdb/milvus:latest
  token: null

# Embedding service configuration (Local)
embedding:
  provider: local
  base_url: http://127.0.0.1:65503/v1
  model_name: qwen3-embedding-0.6b
  batch_size: 32
  enabled: true
  max_model_len: 4096
  gpu_memory_utilization: 0.15
  tensor_parallel_size: 1
  enforce_eager: true

# Reranker service configuration (Local)
reranker:
  provider: local
  enabled: false  # Set to true to enable reranking
  model_path: /home/NagaiYoru/LLM_model/MiniCPM-Reranker-Light
  batch_size: 16
  device: cpu  # cpu Or cuda:0

# Retrieval configuration
retrieval:
  top_k: 5
  rerank_multiplier: 3  # Retrieve top_k * this many, then rerank to top_k

# QA generation configuration (Local)
qa:
  provider: local
  model_name: llama3-3b-instruct
  question_set_path: ./configs/questions.txt
  system_prompt: "你是一个专业的文献库搜索总结智能助手。请基于提供的英文文献，忽略参考文献，使用中文回答问题，要求足够专业。"
  temperature: 0.7
  top_p: 0.8
  max_tokens: 2048
  base_url: http://127.0.0.1:65504/v1
  max_model_len: 4096
  gpu_memory_utilization: 0.84
  tensor_parallel_size: 1
  enforce_eager: true

filtering:
  exclude_reviews: true
  review_keywords:
    - review
    - survey
    - overview

duplicate_detection:
  enabled: true

logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR
  log_dir: ./logs

# Email notification
email:
  enabled: false  
  sender: your_email@gmail.com
  smtp_server: smtp.gmail.com
  smtp_port: 587
  password: your_app_password  # Use app-specific password for Gmail
  receiver: your_email@gmail.com
  subject_prefix: "[IRIS] "

# Web interface configuration
web:
  host: "127.0.0.1"
  port: 8000
  reload: true
  log_level: "info"
  pagination:
    default_per_page: 10
    max_per_page: 100
