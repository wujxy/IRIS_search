# IRIS Configuration File
# Intelligent Research Information System [IRIS]

update:
  interval_hours: 1  # How often to search for new papers

arxiv:
  keywords:
    - neutrino
    - juno
    - dune
    - hyper-kamiokande
    - super-kamiokande
    - sno
    - kamland
    - borexino
  max_results_per_keyword: 10
  sort_by: SubmittedDate  # Options: SubmittedDate, LastUpdatedDate, Relevance

storage:
  database_root: /home/NagaiYoru/research/IRIS_papers
  # Each update creates a timestamped folder structure:
  # update_YYYY_MM_DD_HHMM/
  #   ├── pdfs/
  #   ├── logs/
  #   │   ├── summary_log.md
  #   │   ├── knowledge_log.md
  #   ├── metadata.json
  #   └── update_log.md

ultrarag:
  ultrarag_path: /home/NagaiYoru/LLM_tuning/UltraRAG
  index_backend: milvus  # database type
  index_storage: /home/NagaiYoru/research/IRIS_papers/index_storage
  # UltraRAG pipeline configurations
  pipelines:
    index_watch: piplines/offline_build_index.yaml
    qa_batch: piplines/online_rag_qa.yaml

milvus:
  enabled: true
  container_name: iris-milvus
  data_dir: /home/NagaiYoru/research/IRIS_papers/iris-milvus
  grpc_port: 29901
  http_port: 29902
  image: milvusdb/milvus:latest
  uri: http://localhost:29901
  token: null

models:
  # Embedding model for vector indexing
  embedding_model_path: /home/NagaiYoru/LLM_model/Qwen3-Embedding-0.6B

  # Reranker model for search results
  reranker_model_path: /home/NagaiYoru/LLM_model/MiniCPM-Reranker-Light

  # Generation model for QA and summarization
  llm_model_path: /home/NagaiYoru/LLM_model/Llama-3.2-3B-Instruct

  # vLLM service configuration
  vllm:
    # QA model configuration
    base_url: http://127.0.0.1:65504/v1
    host: 127.0.0.1
    port: 65504
    served_model_name: llama3-3b-instruct
    max_model_len: 8192
    gpu_memory_utilization: 0.85
    tensor_parallel_size: 1
    enforce_eager: true

    # Index model configuration (vLLM-mounted embedding model)
    index:
      model_name: qwen3-embedding-0.6b
      host: 127.0.0.1
      port: 65503
      base_url: http://127.0.0.1:65503/v1
      max_model_len: 4096
      gpu_memory_utilization: 0.15
      tensor_parallel_size: 1
      served_model_name: qwen3-embedding-0.6b

qa:
  question_set_path: ./configs/questions.txt
  # QA generation parameters
  temperature: 0.7
  top_p: 0.8
  max_tokens: 2048
  system_prompt: "你是一个专业的文献库搜索总结智能助手。请基于提供的英文文献，使用中文回答问题，要求足够专业"

email:
  enabled: false  # Set to true to enable email notifications
  sender: your_email@gmail.com
  smtp_server: smtp.gmail.com
  smtp_port: 587
  password: your_app_password  # Use app-specific password for Gmail
  receiver: your_email@gmail.com
  # Email subject prefix
  subject_prefix: "[IRIS] "

filtering:
  # Filter out review papers
  exclude_reviews: true
  review_keywords:
    - review
    - survey
    - overview

duplicate_detection:
  enabled: true
  # Check entry_id against all previous updates

logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR
  log_dir: ./logs
