<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IRIS Literature Browser{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- MathJax for rendering LaTeX math formulas -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="/">IRIS Literature Browser</a>
            </div>
            <div class="nav-search">
                <form action="/search" method="get">
                    <input type="text" name="q" placeholder="Search papers..." value="{{ search_query or '' }}">
                    <button type="submit">Search</button>
                </form>
            </div>
            <div class="nav-links">
                <a href="/">Papers</a>
                <a href="/scheduler">Scheduler</a>
                <a href="/docs">API</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 IRIS - Intelligent Research Information System</p>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/qa-chat.js"></script>
</body>
</html>
